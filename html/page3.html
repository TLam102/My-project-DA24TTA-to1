<DOCTYPE html>
<html lang ="vi">
	<head>
		<title> Đăng Ký</title>
		<mate charset= "utf-8">
		<link rel="stylesheet" href ="../css/style3.css">
	</head>
	<body>
		<div class ="container">
			<form id="frmLogin">
				<h3 id="title">Đăng Ký</h3>
				<div class="form-group">
					<center>
					<label for ="txtUsername">Name</label>
					<input class ="form-control" type ="text" id="txtUsername" name="txtUsername"></input>
					</center>
				</div>
				<div class ="form-group">
					<center>
					<label for ="txtID">ID</label>
					<input class ="form-control" type ="number" id="txtID" name="txtID"></input>
					
					<label for ="rdLop">Lớp</label><br>

					<input type ="radio" name="rdLop">
					<label >DA24TTA</label><br>

					<input type ="radio" name="rdLop">
					<label >DA24TTB</label><br>

					<input type ="radio" name="rdLop">
					<label >DA24TTC</label><br>

					<input type ="radio" name="rdLop">
					<label >DA24TTD</label><br>
					
					<center>
					<label for ="txtBirthday">Birthday</label>
					<input class ="form-control" type ="date" id="txtBirthday" name="txtBirthday"></input>
					</center>
					<label for ="rdGT">Gới tính</label><br>

					<input type ="radio" name="rdGT">
					<label >Nữ</label><br>

					<input type ="radio" name="rdGT">
					<label >Nam</label><br>

					<center>
					<label for ="txtSĐT">Phone</label>
					<input class ="form-control" type ="number" id="txtSĐT" name="txtSĐT"></input>
					</center>
				</div>
				<center>
				<input class="button" type="submit" id="sblogin" name="sblogin" value="Đăng nhập"></input>
				<input class="button" type="reset" id="rsCancel" name="rsCancel" value="Nhập lại"></input>
				</center>
			</form>

		</div>
		
	</body>

</html>
